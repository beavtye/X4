project:
  name: X4Bot
  slug: x4bot
  owner: user
  framework_owner: chatgpt
  implementation_agent: mimo
  status_source: linear
  code_source: github
  handoff_source: gmail

repository:
  root: projects/x4bot
  default_branch: main
  visibility_required: private

structure:
  source: src
  scripts: scripts
  tests: tests
  config_templates: config
  deployment: deploy
  documentation: docs
  manifests: manifests
  tools: tools

change_control:
  top_level_directory_changes_require_approval: true
  cross_module_moves_require_approval: true
  destructive_operations_require_user_approval: true
  secrets_must_never_be_committed: true

handoff:
  required_apps:
    - Gmail
    - GitHub
    - Linear
  bootstrap_doc: docs/handoff/GPT_BOOTSTRAP.md
  current_status_doc: docs/handoff/CURRENT_STATUS.md
  known_issues_doc: docs/handoff/KNOWN_ISSUES.md
